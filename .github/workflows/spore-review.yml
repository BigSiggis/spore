name: SPORE Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  spore-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: BigSiggis/spore/action@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # tavily_api_key: ${{ secrets.TAVILY_API_KEY }}  # optional: enables web grounding
          # generations: 2        # evolutionary generations (default 2)
          # max_files: 10         # max files to review (default 10)
          # file_pattern: '**/*.ts'  # only review certain files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
